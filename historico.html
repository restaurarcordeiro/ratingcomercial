<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histórico — Rating Comercial de Crédito</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>if(sessionStorage.getItem('rc-logado')!=='true'){window.location.href='login.html';}</script>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #16161f;
  --surface3: #1c1c28;
  --border: rgba(139,92,246,0.12);
  --border-hover: rgba(139,92,246,0.3);
  --purple: #7c3aed;
  --purple-light: #a78bfa;
  --purple-soft: #c4b5fd;
  --green: #34d399;
  --amber: #fbbf24;
  --red: #f87171;
  --text: #e8e4f0;
  --muted: #8b8599;
  --dim: #5a5468;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }

/* NAV */
.nav {
  background: rgba(10,10,15,0.95); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border); padding: 0 40px;
  position: sticky; top:0; z-index:100;
  display: flex; align-items: center; justify-content: space-between; height: 64px;
}
.nav-logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #7c3aed, #a78bfa);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 900; color: #fff; letter-spacing: -1px;
}
.logo-text { display: flex; flex-direction: column; line-height: 1.1; }
.logo-title { font-size: 14px; font-weight: 800; color: var(--text); }
.logo-sub { font-size: 10px; color: var(--muted); font-weight: 500; letter-spacing: 0.05em; }
.nav-links { display: flex; gap: 4px; }
.nav-link {
  padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
  color: var(--muted); text-decoration: none; transition: all 0.2s; cursor: pointer;
}
.nav-link:hover { background: var(--surface2); color: var(--text); }
.nav-link.active { background: rgba(124,58,237,0.15); color: var(--purple-soft); }

/* MAIN */
.main { max-width: 960px; margin: 0 auto; padding: 48px 40px 80px; }

.page-header { margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-end; }
.page-header-left {}
.page-badge {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--purple-soft); padding: 5px 14px;
  background: rgba(124,58,237,0.1); border: 1px solid rgba(196,181,253,0.15);
  border-radius: 100px; margin-bottom: 16px;
}
.page-badge .dot { width:6px; height:6px; background:var(--green); border-radius:50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.page-title { font-size: 28px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 8px; }
.page-sub { font-size: 15px; color: var(--muted); }

.btn-danger {
  background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2);
  color: var(--red); padding: 9px 18px; border-radius: 8px;
  font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s;
}
.btn-danger:hover { background: rgba(248,113,113,0.2); }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 32px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 24px 20px; text-align: center;
}
.stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dim); margin-bottom: 8px; }
.stat-value { font-size: 32px; font-weight: 900; letter-spacing: -0.02em; }
.stat-purple .stat-value { color: var(--purple-soft); }
.stat-green .stat-value { color: var(--green); }
.stat-amber .stat-value { color: var(--amber); }

/* SEARCH */
.search-row { margin-bottom: 20px; }
.search-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px; font-size: 14px;
  color: var(--text); font-family: 'Inter',sans-serif; outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--purple); }
.search-input::placeholder { color: var(--dim); }

/* EMPTY */
.empty {
  text-align: center; padding: 80px 40px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px;
}
.empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.empty-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
.btn-primary {
  background: linear-gradient(135deg, #7c3aed, #5b21b6); color: #fff;
  border: none; padding: 12px 28px; border-radius: 10px;
  font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none;
  display: inline-block;
}

/* TABLE */
.table-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
}
.table { width: 100%; border-collapse: collapse; }
.table th {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--dim); text-align: left; padding: 14px 20px;
  border-bottom: 1px solid var(--border); background: var(--surface2);
}
.table td { font-size: 13px; padding: 14px 20px; border-bottom: 1px solid var(--border); color: var(--text); }
.table tr:last-child td { border-bottom: none; }
.table tr:hover td { background: var(--surface2); }

.score-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 700;
}
.score-up { background: rgba(52,211,153,0.12); color: var(--green); }
.score-down { background: rgba(248,113,113,0.12); color: var(--red); }
.score-same { background: rgba(139,92,246,0.12); color: var(--purple-light); }

.btn-ver {
  background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.2);
  color: var(--purple-soft); padding: 5px 14px; border-radius: 6px;
  font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.2s;
}
.btn-ver:hover { background: rgba(124,58,237,0.2); }
.btn-del {
  background: transparent; border: none;
  color: var(--dim); font-size: 16px; cursor: pointer;
  padding: 4px 8px; border-radius: 6px; transition: all 0.2s;
}
.btn-del:hover { color: var(--red); background: rgba(248,113,113,0.1); }

.name-cell { font-weight: 700; }
.cpf-cell { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px); z-index: 200;
  display: none; align-items: center; justify-content: center; padding: 40px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 32px; max-width: 560px; width: 100%;
  max-height: 80vh; overflow-y: auto;
}
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.modal-title { font-size: 18px; font-weight: 800; }
.modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
.modal-section { margin-bottom: 20px; }
.modal-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dim); margin-bottom: 8px; }
.modal-acoes { display: flex; flex-direction: column; gap: 6px; }
.modal-acao {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface2); border-radius: 8px; padding: 9px 12px;
  font-size: 12px; color: var(--muted);
}
.modal-acao-check { color: var(--green); font-size: 13px; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-item { background: var(--surface2); border-radius: 8px; padding: 10px 12px; }
.modal-item-label { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.modal-item-value { font-size: 12px; font-weight: 600; color: var(--text); }
.modal-score-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; }
.modal-score-box { background: var(--surface2); border-radius: 10px; padding: 14px; text-align: center; }
.modal-score-num { font-size: 32px; font-weight: 900; }
.modal-score-class { font-size: 11px; color: var(--muted); margin-top: 4px; }
.modal-score-antes .modal-score-num { color: var(--red); }
.modal-score-depois .modal-score-num { color: var(--green); }
.modal-arrow { text-align: center; font-size: 20px; color: var(--purple-light); }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">
    <div class="logo-icon">RC</div>
    <div class="logo-text">
      <span class="logo-title">Rating Comercial</span>
      <span class="logo-sub">de Crédito</span>
    </div>
  </div>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Novo Relatório</a>
    <a class="nav-link active" href="historico.html">Histórico</a>
    <button class="nav-link" onclick="sair()" style="cursor:pointer;color:#f87171">Sair</button>
  </div>
</nav>

<div class="main">

  <div class="page-header">
    <div class="page-header-left">
      <div class="page-badge"><span class="dot"></span> Histórico</div>
      <h1 class="page-title">Relatórios Gerados</h1>
      <p class="page-sub">Todos os relatórios de atualização de rating emitidos.</p>
    </div>
    <button class="btn-danger" onclick="limparTudo()">🗑 Limpar histórico</button>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card stat-purple">
      <div class="stat-label">Total de relatórios</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat-card stat-green">
      <div class="stat-label">Clientes com score elevado</div>
      <div class="stat-value" id="stat-up">0</div>
    </div>
    <div class="stat-card stat-amber">
      <div class="stat-label">Média de evolução</div>
      <div class="stat-value" id="stat-media">0 pts</div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-row">
    <input class="search-input" id="search" placeholder="Buscar por nome ou CPF..." oninput="filtrar()">
  </div>

  <!-- LISTA -->
  <div id="lista-container"></div>

</div>

<!-- MODAL DETALHE -->
<div class="modal-overlay" id="modal-overlay" onclick="fecharModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-nome">—</div>
      <button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('open')">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
function sair() {
  sessionStorage.removeItem('rc-logado');
  window.location.href = 'login.html';
}

let historico = JSON.parse(localStorage.getItem('rating-historico') || '[]');
let filtrado = [...historico];

function formatDate(iso) {
  if (!iso) return '—';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function calcDiff(d) {
  const a = parseInt(d.scoreAntes) || 0;
  const b = parseInt(d.scoreDepois) || 0;
  return b - a;
}

function renderStats() {
  const total = historico.length;
  const ups = historico.filter(d => calcDiff(d) > 0).length;
  const diffs = historico.map(d => calcDiff(d)).filter(v => v !== 0);
  const media = diffs.length ? Math.round(diffs.reduce((a,b) => a+b, 0) / diffs.length) : 0;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-up').textContent = ups;
  document.getElementById('stat-media').textContent = (media >= 0 ? '+' : '') + media + ' pts';
}

function renderLista() {
  const container = document.getElementById('lista-container');
  if (filtrado.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📂</div>
        <div class="empty-title">${historico.length === 0 ? 'Nenhum relatório ainda' : 'Nenhum resultado encontrado'}</div>
        <div class="empty-sub">${historico.length === 0 ? 'Gere seu primeiro relatório de atualização de rating.' : 'Tente buscar por outro nome ou CPF.'}</div>
        ${historico.length === 0 ? '<a class="btn-primary" href="index.html">Criar primeiro relatório</a>' : ''}
      </div>`;
    return;
  }

  let rows = filtrado.map((d, i) => {
    const diff = calcDiff(d);
    let pillClass = 'score-same';
    let pillText = diff === 0 ? '— pts' : (diff > 0 ? `+${diff} pts` : `${diff} pts`);
    if (diff > 0) pillClass = 'score-up';
    if (diff < 0) pillClass = 'score-down';

    return `<tr>
      <td>
        <div class="name-cell">${d.nome}</div>
        <div class="cpf-cell">${d.cpf}</div>
      </td>
      <td>${d.dataGeracao}</td>
      <td>${d.scoreAntes || '—'} → ${d.scoreDepois || '—'}</td>
      <td><span class="score-pill ${pillClass}">${pillText}</span></td>
      <td>${d.acoes ? d.acoes.length : 0} ações</td>
      <td>
        <button class="btn-ver" onclick="verDetalhe(${d.id})">Ver</button>
        <button class="btn-del" onclick="deletar(${d.id})" title="Excluir">✕</button>
      </td>
    </tr>`;
  }).join('');

  container.innerHTML = `
    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Data de emissão</th>
            <th>Score</th>
            <th>Evolução</th>
            <th>Ações</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function filtrar() {
  const q = document.getElementById('search').value.toLowerCase();
  filtrado = historico.filter(d =>
    d.nome.toLowerCase().includes(q) || d.cpf.includes(q)
  );
  renderLista();
}

function deletar(id) {
  if (!confirm('Excluir este relatório do histórico?')) return;
  historico = historico.filter(d => d.id !== id);
  filtrado = filtrado.filter(d => d.id !== id);
  localStorage.setItem('rating-historico', JSON.stringify(historico));
  renderStats();
  renderLista();
}

function limparTudo() {
  if (!confirm('Tem certeza que quer limpar todo o histórico? Esta ação não pode ser desfeita.')) return;
  historico = [];
  filtrado = [];
  localStorage.setItem('rating-historico', JSON.stringify([]));
  renderStats();
  renderLista();
}

function verDetalhe(id) {
  const d = historico.find(x => x.id === id);
  if (!d) return;

  document.getElementById('modal-nome').textContent = d.nome;
  const diff = calcDiff(d);

  let acoesHtml = d.acoes && d.acoes.length > 0
    ? d.acoes.map(a => `<div class="modal-acao"><span class="modal-acao-check">✓</span>${a}</div>`).join('')
    : '<div style="color:var(--dim);font-size:12px">Nenhuma ação registrada.</div>';

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-section">
      <div class="modal-label">Evolução do Score</div>
      <div class="modal-score-row">
        <div class="modal-score-box modal-score-antes">
          <div class="modal-score-num">${d.scoreAntes || '—'}</div>
          <div class="modal-score-class">Antes · ${d.classAntes || '—'}</div>
        </div>
        <div class="modal-arrow">→</div>
        <div class="modal-score-box modal-score-depois">
          <div class="modal-score-num">${d.scoreDepois || '—'}</div>
          <div class="modal-score-class">Depois · ${d.classDepois || '—'}</div>
        </div>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-label">Dados do Cliente</div>
      <div class="modal-grid">
        <div class="modal-item"><div class="modal-item-label">CPF</div><div class="modal-item-value">${d.cpf}</div></div>
        <div class="modal-item"><div class="modal-item-label">Estado civil</div><div class="modal-item-value">${d.civil || '—'}</div></div>
        <div class="modal-item"><div class="modal-item-label">Nascimento</div><div class="modal-item-value">${d.nascimento ? formatDate(d.nascimento) : '—'}</div></div>
        <div class="modal-item"><div class="modal-item-label">Cidade</div><div class="modal-item-value">${d.cidade || '—'}</div></div>
        <div class="modal-item"><div class="modal-item-label">Renda antes</div><div class="modal-item-value">${d.rendaAntes || '—'}</div></div>
        <div class="modal-item"><div class="modal-item-label">Renda depois</div><div class="modal-item-value">${d.rendaDepois || '—'}</div></div>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-label">Ações Realizadas</div>
      <div class="modal-acoes">${acoesHtml}</div>
    </div>
    ${d.obs ? `<div class="modal-section"><div class="modal-label">Observações</div><div style="font-size:13px;color:var(--muted);line-height:1.6">${d.obs}</div></div>` : ''}
    <div style="margin-top:16px;text-align:center">
      <button class="btn-primary" onclick="reabrirPDF(${d.id})" style="font-size:13px;padding:10px 24px">⬇ Reabrir PDF</button>
    </div>
  `;

  document.getElementById('modal-overlay').classList.add('open');
}

function reabrirPDF(id) {
  const d = historico.find(x => x.id === id);
  if (!d) return;
  localStorage.setItem('rating-atual', JSON.stringify(d));
  window.open('relatorio.html', '_blank');
}

function fecharModal(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

renderStats();
renderLista();
</script>
</body>
</html>
